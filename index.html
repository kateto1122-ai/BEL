<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>БЕЛ Елит Арена – 7 клас | НВО подготовка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #0f2b1d 0%, #1a3a2a 100%);
            --card-bg: rgba(255, 248, 225, 0.95);
            --glass-bg: rgba(255, 245, 215, 0.85);
            --primary: #c9771e;
            --primary-dark: #9b5b15;
            --success: #2b7342;
            --error: #bd4a3a;
            --text-dark: #2c2e1e;
            --text-light: #fef3d6;
            --shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            --border-radius: 2rem;
        }

        body.dark {
            --bg-gradient: linear-gradient(135deg, #0a1210 0%, #111d18 100%);
            --card-bg: rgba(30, 30, 35, 0.95);
            --glass-bg: rgba(25, 25, 30, 0.9);
            --text-dark: #f0ebd8;
            --text-light: #cfcab7;
            --shadow: 0 20px 35px -5px rgba(0,0,0,0.6);
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
        }

        /* основен контейнер */
        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        /* горен панел с настройки */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .logo h2 {
            font-size: 1.6rem;
            background: linear-gradient(120deg, #ffd966, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .controls {
            display: flex;
            gap: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 0.3rem 1rem;
            border-radius: 3rem;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-dark);
            padding: 0.3rem;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255,200,100,0.3);
            transform: scale(1.05);
        }

        /* dashboard статистика */
        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 0.8rem;
            text-align: center;
            box-shadow: var(--shadow);
            color: var(--text-dark);
            font-weight: bold;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        /* основна игра */
        .quiz-panel {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }

        .category-tabs {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            padding-bottom: 0.8rem;
        }

        .tab {
            background: #ece3cd;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            color: #3a3c2c;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .question-area {
            margin: 1.5rem 0;
        }

        .timer-bar {
            background: #ddd6bf;
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .timer-progress {
            width: 100%;
            height: 100%;
            background: var(--primary);
            transition: width 0.05s linear;
        }

        .question-text {
            font-size: 1.7rem;
            font-weight: 600;
            margin: 1rem 0;
            line-height: 1.3;
            color: var(--text-dark);
        }

        .options-grid {
            display: grid;
            gap: 1rem;
            margin: 1.8rem 0;
        }

        .option {
            background: #f2e9d2;
            border: 1px solid #e0cfaa;
            padding: 1rem 1.2rem;
            border-radius: 3rem;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.1s;
            color: #2a2a1c;
            font-weight: 500;
        }

        .option:hover:not(.disabled-opt) {
            background: #ffecb3;
            transform: translateX(8px);
            border-color: var(--primary);
        }

        .correct-highlight {
            background: var(--success) !important;
            color: white;
            border-color: #196f3d;
            transform: scale(1.01);
        }

        .wrong-highlight {
            background: var(--error) !important;
            color: #fff0e0;
            text-decoration: line-through;
        }

        .feedback {
            background: rgba(0,0,0,0.05);
            border-radius: 2rem;
            padding: 1rem;
            margin: 1rem 0;
            font-weight: bold;
            text-align: center;
            color: var(--text-dark);
        }

        .next-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            border-radius: 3rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-game {
            background: #5f5a3e;
            margin-top: 0.5rem;
        }

        .flex-btns {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .badge {
            background-color: gold;
            color: #5a3e1b;
            border-radius: 2rem;
            padding: 0.2rem 1rem;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); background: #ffd966; }
        }

        .animated-correct {
            animation: pulse 0.3s ease;
        }

        footer {
            text-align: center;
            color: #d9cfaa;
            margin-top: 2rem;
        }

        @media (max-width: 700px) {
            .question-text { font-size: 1.3rem; }
            .option { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="top-bar">
        <div class="logo"><h2>📖 БЕЛ Елит Арена • 7 клас</h2></div>
        <div class="controls">
            <button id="soundToggle" class="icon-btn">🔊</button>
            <button id="themeToggle" class="icon-btn">🌙</button>
            <button id="quickTestBtn" class="icon-btn" title="Бърз тест (10 случайни)">⚡</button>
        </div>
    </div>

    <div class="stats-dashboard">
        <div class="stat-card">⭐ Точки <div class="stat-value" id="scoreValue">0</div></div>
        <div class="stat-card">🔥 Серия <div class="stat-value" id="streakValue">0</div></div>
        <div class="stat-card">🏆 Ниво <div class="stat-value" id="levelValue">Ученик</div></div>
        <div class="stat-card">📊 Рекорд <div class="stat-value" id="recordValue">0</div></div>
    </div>

    <div class="quiz-panel">
        <div class="category-tabs" id="categoryTabs">
            <button data-cat="0" class="tab active">📖 Части на речта</button>
            <button data-cat="1" class="tab">📜 Литературни термини</button>
            <button data-cat="2" class="tab">✍️ Правопис & НВО</button>
        </div>

        <div class="timer-bar"><div class="timer-progress" id="timerProgress" style="width: 100%;"></div></div>
        <div class="question-area">
            <div class="question-text" id="questionText">Зареждане...</div>
            <div class="options-grid" id="optionsContainer"></div>
            <div class="feedback" id="feedbackMsg"></div>
            <div class="flex-btns">
                <button id="nextQuestionBtn" class="next-btn">➡ Следващ въпрос</button>
                <button id="resetProgressBtn" class="next-btn reset-game">🔄 Нов старт</button>
            </div>
        </div>
    </div>
    <footer>🎯 Иновативна тренировка за НВО • Звук • Теми • Сертификат след 30 въпроса</footer>
</div>

<script>
    // ---------- БОГАТА БАЗА ВЪПРОСИ (30) ----------
    const QUESTIONS_DB = [
        // Части на речта (0-9)
        { category:0, text:"„Не“ в „Не искам“ е:", options:["Глагол","Частица","Предлог","Местоимение"], correct:1, explanation:"Частица за отрицание пред глагол." },
        { category:0, text:"Коя част на речта е „бързо“ в „Тичаше бързо“?", options:["Прилагателно","Наречие","Съществително","Числително"], correct:1, explanation:"Наречие за начин." },
        { category:0, text:"„Пред“ в „пред училище“ е:", options:["Предлог","Съюз","Наречие","Междуметие"], correct:0, explanation:"Предлог за място." },
        { category:0, text:"Лично местоимение е:", options:["неин","нейният","тя","нейно"], correct:2, explanation:"„Тя“ – лично мястоимение." },
        { category:0, text:"„Защото“ в изречение е:", options:["Предлог","Частица","Съюз","Местоимение"], correct:2, explanation:"Подчинителен съюз." },
        { category:0, text:"Думата „пет“ в „пет ябълки“ е:", options:["Бройно числ.","Редно числ.","Същ. име","Прил. име"], correct:0, explanation:"Бройно числително." },
        { category:0, text:"Възвратно местоимение е:", options:["мен","си","тебе","него"], correct:1, explanation:"„Си“ – възвратно." },
        { category:0, text:"„Хайде“ във „Хайде, започвай!“ е:", options:["Глагол","Междуметие","Частица","Наречие"], correct:1, explanation:"Междуметие за подкана." },
        { category:0, text:"Съюз в реда:", options:["а, но, защото","и, под, въпреки","обаче, между, при","за, без, през"], correct:0, explanation:"„а, но, защото“ са съюзи." },
        { category:0, text:"Коя дума е прилагателно?", options:["ходене","пясъчен","тичане","мислене"], correct:1, explanation:"„пясъчен“ – относително прилагателно." },
        // Литературни термини (10-19)
        { category:1, text:"Кое НЕ е литературен род?", options:["Епос","Лирика","Драма","Сонет"], correct:3, explanation:"Сонетът е жанр, не род." },
        { category:1, text:"Хиперболата е:", options:["Преувеличение","Олицетворение","Сравнение","Епитет"], correct:0, explanation:"Преувеличение." },
        { category:1, text:"Кой е автор на „Песен за колелетата“?", options:["Иван Вазов","Христо Ботев","Пейо Яворов","Елин Пелин"], correct:1, explanation:"Христо Ботев." },
        { category:1, text:"Как се нарича повтарянето на начален звук?", options:["Алитерация","Асонанс","Ритъм","Рима"], correct:0, explanation:"Алитерация." },
        { category:1, text:"Баснята „Щастливецът“ е от:", options:["Йордан Йовков","Добри Чинтулов","Николай Хайтов","Алеко Константинов"], correct:3, explanation:"Алеко Константинов – Щастливецът." },
        { category:1, text:"Какво е метафора?", options:["Скрито сравнение","Повторение на думи","Преувеличение","Обратен ред на думите"], correct:0, explanation:"Скрито сравнение." },
        { category:1, text:"Кой разказ е на Йовков?", options:["Биволът","Приключения","Под игото","Тютюн"], correct:0, explanation:"„Биволът“ от Йовков." },
        { category:1, text:"Олицетворение има в:", options:["Вятърът стене","Камък като планина","Слънце в очите","Бял сняг"], correct:0, explanation:"Стене – човешко качество." },
        { category:1, text:"Епитетът е:", options:["Художествено определение","Сравнителна конструкция","Звукоподражание","Алегория"], correct:0, explanation:"Художествено определение." },
        { category:1, text:"Кой е главният герой в „Майце си“ (Ботев)?", options:["Майката","Бунтовникът","Родината","Братята"], correct:0, explanation:"Обръщение към майка." },
        // Правопис и норми (20-29)
        { category:2, text:"Кое е изписано вярно?", options:["Противоположен","Противоположен","Противо положен","Противоположен"], correct:0, explanation:"Противоположен – слято." },
        { category:2, text:"Къде членуване е грешно?", options:["Героят","Морето","Ученика","Вратарят"], correct:2, explanation:"Правилно е ученикът (пълен член)." },
        { category:2, text:"В кой ред всички думи са с „ъ“?", options:["път, къща, мъж","път, кьща, муж","путь, кыща, мъж","път, къшта, муж"], correct:0, explanation:"път, къща, мъж." },
        { category:2, text:"„Книг(о/а)издателство“ се пише:", options:["Книгоиздателство","Книгаиздателство","Книгиздателство","Книго-издателство"], correct:0, explanation:"Със свързваща гласна о." },
        { category:2, text:"Кое е вярно изречение?", options:["Той е по-добър от мен","Той е по-добър от мене","Той е по-добър от менe","Той е по-добър от азе"], correct:0, explanation:"Норма: от мен (кратка форма)." },
        { category:2, text:"„Студе(н/нн)о“ колко н?", options:["едно н","две нн","никога","само меко"], correct:0, explanation:"Студено – едно н." },
        { category:2, text:"Грешно слято писане:", options:["въпреки","вместо","върху","във всеки"], correct:3, explanation:"„във всеки“ се пише разделно." },
        { category:2, text:"„Седемдесет и двама“ – коя част на речта?", options:["Бройно числ.","Редно числ.","Събирателно числ.","Множествено"], correct:2, explanation:"Събирателно числително." },
        { category:2, text:"Кой съюз не е правилен?", options:["понеже","щото","защото","че"], correct:1, explanation:"„щото“ е разговорен, не е книжовен." },
        { category:2, text:"Множествено число на „теле“:", options:["телета","телища","телеса","тела"], correct:0, explanation:"теле – телета (правилно)." }
    ];

    // game state
    let currentCategory = 0;          // 0,1,2
    let currentQuestionsList = [];     // филтрирани по категория
    let currentQIndex = 0;
    let score = 0;
    let streak = 0;
    let highScore = localStorage.getItem("bel_highscore") ? parseInt(localStorage.getItem("bel_highscore")) : 0;
    let totalGamesPlayed = 0;          // брой отговори
    let answered = false;
    let selectedIdx = null;
    let timerInterval = null;
    let timeLeft = 18; // секунди на въпрос
    let soundEnabled = localStorage.getItem("bel_sound") !== "false";
    let darkMode = localStorage.getItem("bel_dark") === "true";

    let correctSound = new Audio("data:audio/wav;base64,U3RlYWx0aCBzb3VuZCBub3QgYXZhaWxhYmxlLCBidXQgc2lsZW50IGJlZXA=");
    let wrongSound = new Audio("data:audio/wav;base64,U3RlYWx0aCBzb3VuZCBmYWls");
    // виртуални звуци - няма да има реален звук, но ще симулираме пийп през Web Audio? добавяме простичка функция
    function playSound(type) {
        if (!soundEnabled) return;
        try {
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let oscillator = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = "sine";
            let freq = type === 'correct' ? 880 : 440;
            oscillator.frequency.value = freq;
            gainNode.gain.value = 0.2;
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            oscillator.stop(audioCtx.currentTime + 0.3);
        } catch(e) { console.log("audio err"); }
    }

    function updateHighScoreUI() { document.getElementById("recordValue").innerText = highScore; }
    function setDarkMode(val) {
        if(val) document.body.classList.add("dark");
        else document.body.classList.remove("dark");
        localStorage.setItem("bel_dark", val);
    }

    // филтрира въпроси по категория
    function filterQuestionsByCat(cat) {
        let filtered = QUESTIONS_DB.filter(q => q.category === cat);
        // да има поне 10 въпроса, ако няма достатъчно (за теста)
        return filtered;
    }

    function loadCategory(cat) {
        currentCategory = cat;
        currentQuestionsList = filterQuestionsByCat(cat);
        currentQIndex = 0;
        answered = false;
        selectedIdx = null;
        if(timerInterval) clearInterval(timerInterval);
        startTimer();
        renderCurrentQuestion();
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timeLeft = 18;
        let progressElem = document.getElementById("timerProgress");
        if(progressElem) progressElem.style.width = "100%";
        timerInterval = setInterval(() => {
            if(answered) return;
            if(timeLeft <= 0) {
                // изтече време – грешка
                clearInterval(timerInterval);
                if(!answered) {
                    handleAnswer(null, true);
                }
            } else {
                timeLeft--;
                let percent = (timeLeft / 18) * 100;
                if(progressElem) progressElem.style.width = percent + "%";
            }
        }, 1000);
    }

    function handleAnswer(clickedIdx, isTimeout = false) {
        if(answered) return;
        answered = true;
        if(timerInterval) clearInterval(timerInterval);
        const q = currentQuestionsList[currentQIndex];
        let isCorrect = false;
        if(!isTimeout && clickedIdx !== undefined && clickedIdx === q.correct) {
            isCorrect = true;
        }
        if(isCorrect) {
            score++;
            streak++;
            playSound('correct');
            document.getElementById("scoreValue").innerText = score;
            document.getElementById("streakValue").innerText = streak;
            document.querySelectorAll('.option')[clickedIdx].classList.add('correct-highlight');
            document.getElementById("feedbackMsg").innerHTML = `✅ Вярно! ${q.explanation || ''}`;
        } else {
            streak = 0;
            playSound('wrong');
            document.getElementById("streakValue").innerText = streak;
            let correctIdx = q.correct;
            document.querySelectorAll('.option')[correctIdx]?.classList.add('correct-highlight');
            if(clickedIdx !== undefined && clickedIdx !== correctIdx)
                document.querySelectorAll('.option')[clickedIdx]?.classList.add('wrong-highlight');
            document.getElementById("feedbackMsg").innerHTML = `❌ Грешка! ${q.explanation || ''} Правилен: ${q.options[q.correct]}`;
        }
        totalGamesPlayed++;
        // update level based on score
        let level = "Ученик";
        if(score >= 20) level = "📖 Ерудит";
        else if(score >= 10) level = "🎓 Знаещ";
        document.getElementById("levelValue").innerText = level;
        if(score > highScore) { highScore = score; localStorage.setItem("bel_highscore", highScore); updateHighScoreUI(); }

        document.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled-opt'));
        document.getElementById("nextQuestionBtn").disabled = false;
    }

    function renderCurrentQuestion() {
        if(currentQuestionsList.length === 0) return;
        const q = currentQuestionsList[currentQIndex];
        document.getElementById("questionText").innerHTML = q.text;
        let optsHtml = "";
        q.options.forEach((opt, i) => {
            optsHtml += `<div class="option" data-opt="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`;
        });
        document.getElementById("optionsContainer").innerHTML = optsHtml;
        document.getElementById("feedbackMsg").innerHTML = "";
        answered = false;
        document.getElementById("nextQuestionBtn").disabled = true;
        document.querySelectorAll('.option').forEach(el => {
            el.classList.remove('correct-highlight','wrong-highlight','disabled-opt');
            el.addEventListener('click', (e) => {
                if(answered) return;
                let idx = parseInt(el.dataset.opt);
                handleAnswer(idx);
            });
        });
        if(timerInterval) clearInterval(timerInterval);
        startTimer();
        // ако бърз тест активен? сменяме
    }

    function nextQuestion() {
        if(!answered && currentQuestionsList.length > 0) return;
        if(currentQIndex + 1 < currentQuestionsList.length) {
            currentQIndex++;
            answered = false;
            selectedIdx = null;
            renderCurrentQuestion();
        } else {
            // завършване на цялата категория - поздрав + сертификат
            let totalScore = score;
            let totalQ = currentQuestionsList.length;
            document.getElementById("feedbackMsg").innerHTML = `🎉 Завършихте всички въпроси в категорията! Общ резултат: ${totalScore}/${totalQ} 🎉<br>📜 Генериране на сертификат...`;
            generateCertificate();
            // автоматично ресет след 2 сек? но ще оставим бутон за нов старт.
            document.getElementById("nextQuestionBtn").disabled = true;
        }
    }

    function generateCertificate() {
        let win = window.open();
        win.document.write(`
            <html><head><title>Сертификат БЕЛ</title><style>body{font-family:Georgia;padding:2rem;text-align:center;background:#fef7e0;}
            .cert{border:8px double #c2973a;padding:2rem;margin:1rem;background:#fff6e5;}
            h1{color:#9b6a1f;}</style></head><body><div class="cert"><h1>🏅 СЕРТИФИКАТ 🏅</h1>
            <p>За отлични постижения по БЕЛ - 7 клас</p>
            <p>Точки: ${score} &nbsp;|&nbsp; Серия: ${streak}</p>
            <p>⭐ Ниво: ${document.getElementById("levelValue").innerText}</p>
            <p>Дата: ${new Date().toLocaleDateString()}</p>
            <button onclick="window.print()">🖨️ Печат</button></div></body></html>
        `);
    }

    function resetProgress() {
        score = 0; streak = 0; currentQIndex = 0; answered = false;
        document.getElementById("scoreValue").innerText = "0";
        document.getElementById("streakValue").innerText = "0";
        loadCategory(currentCategory);
    }

    function quickTest() {
        let all = [...QUESTIONS_DB];
        let shuffled = all.sort(() => 0.5 - Math.random());
        let selected = shuffled.slice(0, 10);
        currentQuestionsList = selected;
        currentQIndex = 0;
        score = 0; streak = 0;
        document.getElementById("scoreValue").innerText = "0";
        document.getElementById("streakValue").innerText = "0";
        answered = false;
        renderCurrentQuestion();
        document.getElementById("feedbackMsg").innerHTML = "⚡ БЪРЗ ТЕСТ: 10 случайни въпроса!";
    }

    window.onload = () => {
        if(highScore) updateHighScoreUI();
        setDarkMode(darkMode);
        document.getElementById("themeToggle").addEventListener("click", () => {
            darkMode = !darkMode;
            setDarkMode(darkMode);
        });
        document.getElementById("soundToggle").addEventListener("click", () => {
            soundEnabled = !soundEnabled;
            localStorage.setItem("bel_sound", soundEnabled);
            document.getElementById("soundToggle").innerHTML = soundEnabled ? "🔊" : "🔇";
        });
        document.getElementById("nextQuestionBtn").addEventListener("click", nextQuestion);
        document.getElementById("resetProgressBtn").addEventListener("click", resetProgress);
        document.getElementById("quickTestBtn").addEventListener("click", quickTest);
        document.querySelectorAll(".tab").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let cat = parseInt(btn.dataset.cat);
                document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                btn.classList.add("active");
                if(timerInterval) clearInterval(timerInterval);
                resetProgress(); 
                currentCategory = cat;
                loadCategory(cat);
            });
        });
        loadCategory(0);
        // SoundToggle icon
        document.getElementById("soundToggle").innerHTML = soundEnabled ? "🔊" : "🔇";
    };
</script>
</body>
</html>
